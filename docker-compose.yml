version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    depends_on:
      - db

  db:
    image: supabase/postgrest
    environment:
      POSTGREST_DB_URI: postgres://<your-supabase-credentials>
      POSTGREST_DB_ANON_ROLE: anon
      POSTGREST_DB_USER: "user"
      POSTGREST_DB_PASSWORD: "password"